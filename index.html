<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꿈해몽 AI 로또 - 당신의 꿈을 현실로</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --neon: #a78bfa; /* Dreamy Purple */
            --accent: #f472b6; /* Soft Pink */
            --text: #f8fafc;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #312e81 100%);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; margin: 0; color: var(--neon); letter-spacing: 1px; font-weight: 800; }
        .header p { color: #cbd5e1; font-size: 0.9rem; margin-top: 10px; font-weight: 400; opacity: 0.9; line-height: 1.4; }

        .input-area { margin-bottom: 25px; display: flex; flex-direction: column; gap: 18px; }
        .input-item { display: flex; flex-direction: column; gap: 8px; }
        .input-item label { font-size: 0.9rem; color: var(--accent); font-weight: 600; display: flex; align-items: center; gap: 6px; }
        
        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #475569;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--neon); outline: none; box-shadow: 0 0 15px rgba(167, 139, 250, 0.3); }

        .btn-draw {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--neon), var(--accent));
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.4);
        }
        .btn-draw:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(167, 139, 250, 0.6); }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.5s ease-out;
        }

        .result-main { display: flex; align-items: center; justify-content: space-between; }
        .balls { display: flex; gap: 6px; }
        .ball {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .c1 { background: #fbbf24; } .c2 { background: #60a5fa; }
        .c3 { background: #f87171; } .c4 { background: #94a3b8; } .c5 { background: #4ade80; }

        .side-info { text-align: right; min-width: 60px; font-size: 0.7rem; color: #94a3b8; font-family: monospace; }

        #final-summary {
            margin-top: 25px;
            padding: 20px;
            background: rgba(167, 139, 250, 0.1);
            border-radius: 16px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--neon);
            display: none;
            border: 1px solid rgba(167, 139, 250, 0.3);
            font-weight: 500;
            line-height: 1.6;
        }

        .footer-warning {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
            line-height: 1.6;
            opacity: 0.7;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🌙 꿈해몽 AI 로또</h1>
            <p>어젯밤 당신의 꿈에는<br>엄청난 행운이 숨어있을지 모릅니다.</p>
        </div>

        <div class="input-area">
            <div class="input-item">
                <label>🔮 꿈에서 본 숫자나 날짜</label>
                <input type="text" id="inc" placeholder="예: 7, 14 (콤마로 구분)" oninput="filterNonNumeric(this)">
            </div>
            <div class="input-item">
                <label>🌫️ 흐릿하거나 피하고 싶은 숫자</label>
                <input type="text" id="exc" placeholder="제외할 숫자 입력" oninput="filterNonNumeric(this)">
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <label style="font-size: 0.9rem; color: #cbd5e1;">추출할 조합 수</label>
                <input type="number" id="sets" value="5" min="1" max="10" style="width: 80px; text-align: center;">
            </div>
        </div>

        <button class="btn-draw" onclick="runAnalysis()">✨ 꿈의 메시지 해석하기</button>

        <div id="results" style="margin-top: 25px;"></div>
        <div id="final-summary"></div>

        <div class="footer-warning">
            당신의 무의식이 보내는 신호를 해석했습니다.<br>
            행운은 믿는 사람에게 찾아옵니다.
        </div>
    </div>

    <script>
        const summaries = [
            "🌙 길몽입니다. 당신의 꿈이 현실이 될 시간입니다.",
            "✨ 별들이 당신을 비추고 있습니다. 이 번호를 소중히 간직하세요.",
            "🦋 나비가 날아오듯, 행운이 당신 어깨에 앉을 것입니다.",
            "🌊 거대한 파도처럼 재물이 밀려올 징조가 보입니다.",
            "🗝️ 행운의 열쇠를 찾았습니다. 이제 문을 열 차례입니다."
        ];

        function filterNonNumeric(obj) {
            obj.value = obj.value.replace(/[^0-9,\, ]/g, '');
        }

        function runAnalysis() {
            const results = document.getElementById('results');
            const summary = document.getElementById('final-summary');
            
            const incVal = document.getElementById('inc').value;
            const excVal = document.getElementById('exc').value;
            const count = parseInt(document.getElementById('sets').value) || 1;

            const inc = parse(incVal);
            const exc = parse(excVal);

            if ([...inc, ...exc].some(n => n < 1 || n > 45)) {
                alert("1부터 45 사이의 숫자만 꿈에 나타납니다.");
                return;
            }

            results.innerHTML = '';
            summary.style.display = 'none';

            for(let i=0; i<count; i++) {
                const data = getCombination(inc, exc);
                renderSet(i+1, data);
            }

            summary.innerHTML = summaries[Math.floor(Math.random() * summaries.length)];
            summary.style.display = 'block';
        }

        function parse(s) {
            return [...new Set(s.split(/[ ,]+/).filter(x => x !== "").map(Number).filter(n => !isNaN(n)))];
        }

        function getCombination(inc, exc) {
            let pool = Array.from({length: 45}, (_, i) => i + 1).filter(n => !exc.includes(n) && !inc.includes(n));
            pool.sort(() => Math.random() - 0.5);
            let res = [...inc].slice(0, 6);
            while(res.length < 6 && pool.length > 0) {
                res.push(pool.pop());
            }
            res.sort((a, b) => a - b);
            return {
                nums: res,
                sum: res.reduce((a, b) => a + b, 0),
                odd: res.filter(n => n % 2 !== 0).length,
                even: 6 - res.filter(n => n % 2 !== 0).length
            };
        }

        function renderSet(idx, data) {
            const container = document.getElementById('results');
            const card = document.createElement('div');
            card.className = 'result-card';
            
            let ballsHtml = '<div class="balls">';
            data.nums.forEach(n => {
                let c = 'c5';
                if(n<=10) c='c1'; else if(n<=20) c='c2'; else if(n<=30) c='c3'; else if(n<=40) c='c4';
                ballsHtml += `<div class="ball ${c}">${n}</div>`;
            });
            ballsHtml += '</div>';

            card.innerHTML = `
                <div class="result-main">
                    <div style="font-size: 0.8rem; font-weight: 600; color: var(--neon); opacity: 0.8;">운명 ${idx}</div>
                    ${ballsHtml}
                </div>
            `;
            container.appendChild(card);
        }
    </script>
</body>
</html>
